services:
  - type: web
    name: tradbot-api
    runtime: docker
    plan: free
    # Évite tout shim `uvicorn` sur le PATH (erreur « unrecognized arguments: ai_server:app »).
    dockerCommand: sh -c 'exec python -m uvicorn ai_server:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DISABLE_ML_TRAINING
        value: "true"
      # Ne pas fixer PORT ici : Render injecte PORT dynamiquement sur les Web Services.
      # MT5 / DB : renseigner uniquement dans le dashboard Render (Blueprint sync: false).
      - key: MT5_LOGIN
        sync: false
      - key: MT5_PASSWORD
        sync: false
      - key: MT5_SERVER
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AWS_RDS_HOST
        sync: false
      - key: AWS_RDS_PORT
        sync: false
      - key: AWS_RDS_DATABASE
        sync: false
      - key: AWS_RDS_USER
        sync: false
      - key: AWS_RDS_PASSWORD
        sync: false
      - key: AWS_RDS_SSLMODE
        value: "require"
      - key: USE_SUPABASE
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: MODELS_DIR
        value: "/tmp/models"
      - key: DATA_DIR
        value: "/tmp/data"
    buildFilter:
      paths:
        - Dockerfile
        - requirements-cloud.txt
        - pyproject.toml
        - ai_server.py
        - ai_server_cloud.py
        - requirements.txt
        - backend/**
    repo: https://github.com/Sidoine1991/KolaTradeboT.git
    rootDir: .
    autoDeploy: yes
    disk:
      name: models-disk
      mountPath: /models
      sizeGB: 1
    # Note: Disks require a paid Render plan (free plan = no persistence).
