services:
  - type: web
    name: tradbot-api
    env: docker
    plan: free
    # Le Dockerfile contient déjà CMD ["uvicorn", "ai_server:app", "--host", "0.0.0.0", "--port", "10000"]
    # On ne met donc PAS de startCommand ici pour éviter les conflits
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DISABLE_ML_TRAINING
        value: "true"  # Désactiver l'entraînement au démarrage pour éviter les timeouts
      - key: MT5_LOGIN
        value: "5775742"
      - key: MT5_PASSWORD
        value: "Sahara1991@"
      - key: MT5_SERVER
        value: "Deriv-Demo"
      - key: DATABASE_URL
        value: "postgresql://dbadmin:REMOVED_DB_PASSWORD@trading-db.cq9suk2wcwxh.us-east-1.rds.amazonaws.com:5432/trading_bot?sslmode=require"
      - key: AWS_RDS_HOST
        value: "trading-db.cq9suk2wcwxh.us-east-1.rds.amazonaws.com"
      - key: AWS_RDS_PORT
        value: "5432"
      - key: AWS_RDS_DATABASE
        value: "trading_bot"
      - key: AWS_RDS_USER
        value: "dbadmin"
      - key: AWS_RDS_PASSWORD
        value: "REMOVED_DB_PASSWORD"
      - key: AWS_RDS_SSLMODE
        value: "require"
      - key: USE_SUPABASE
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: MODELS_DIR
        value: "/tmp/models"
      - key: DATA_DIR
        value: "/tmp/data"
    buildFilter:
      paths:
        - ai_server.py
        - ai_server_cloud.py
        - requirements.txt
        - backend/
    repo: https://github.com/Sidoine1991/KolaTradeboT.git
    rootDir: .
    autoDeploy: yes
    disk:
      name: models-disk
      mountPath: /models
      sizeGB: 1
    # Note: Disks require a paid Render plan. 
    # If on free plan, persistence will not be available.
